services:
  content-inbox:
    build: .
    container_name: content-inbox
    restart: unless-stopped
    env_file:
      - .env
    environment:
      CONTENT_INBOX_HOST: 0.0.0.0
      CONTENT_INBOX_PORT: 8787
      CONTENT_INBOX_DB: /data/content_inbox.sqlite3
    ports:
      - "8787:8787"
    volumes:
      - ./data:/data

